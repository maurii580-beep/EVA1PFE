<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Fotografias - Capturando Momentos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="bg-dark text-white p-3">
        <div class="container d-flex justify-content-between align-items-center">
            <h1>Pixel Fotografias</h1>
            <nav>
                <ul class="nav">
                    <li class="nav-item"><a class="nav-link text-white" href="#galeria">Galería</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="#servicios">Servicios</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="#contacto">Contacto</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container mt-4"> <section id="inicio" class="text-center py-5">
            <h2 class="display-4">Fotografía Profesional</h2>
            <p class="lead">Inmortalizando tus mejores recuerdos con estilo y técnica.</p>
            <img src="img/hero-camera.jpg" alt="Cámara profesional sobre un trípode en un paisaje al atardecer" class="img-fluid rounded shadow">
        </section>

        <section id="galeria" class="py-5">
            <h2 class="text-center mb-4">Mi Portafolio</h2>
            <div class="row g-4">
                <div class="col-md-4">
                    <article class="card"> <img src="img/boda.jpg" alt="Pareja recién casada bajo un arco de flores" class="card-img-top">
                        <div class="card-body"><h3>Bodas</h3></div>
                    </article>
                </div>
                <div class="col-md-4">
                    <article class="card">
                        <img src="img/paisaje.jpg" alt="Montañas reflejadas en un lago cristalino" class="card-img-top">
                        <div class="card-body"><h3>Naturaleza</h3></div>
                    </article>
                </div>
                <div class="col-md-4">
                    <article class="card">
                        <img src="img/retrato.jpg" alt="Retrato en primer plano con fondo desenfocado" class="card-img-top">
                        <div class="card-body"><h3>Retratos</h3></div>
                    </article>
                </div>
            </div>
        </section>

        <section id="contacto" class="bg-light p-5 rounded">
            <h2 class="text-center">Reserva tu Sesión</h2>
            <form action="#" method="POST" class="mx-auto" style="max-width: 500px;">
                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre Completo:</label>
                    <input type="text" id="nombre" name="nombre" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Enviar Solicitud</button>
            </form>
        </section>
    </main>

    <footer class="bg-dark text-white text-center py-4 mt-5">
        <p>&copy; 2026 Mauri Photo - Evaluación Front End INACAP</p>
    </footer>
</body>
</html>
